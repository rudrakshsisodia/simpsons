version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc

brews:
  - repository:
      owner: rudrakshsisodia
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/rudrakshsisodia/simpsons"
    description: "TUI analytics dashboard for Claude Code sessions"
    license: "MIT"
